<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma | Zero-Trust Secure Vault</title>
    <style>
        :root {
            --bg-main: #0a0614;
            --bg-panel: #160f2a;
            --bg-panel-2: #1c1436;
            --line: #3a2c63;
            --text-main: #e7dbff;
            --text-muted: #a48dc9;
            --neon-cyan: #a78bfa;
            --neon-emerald: #c084fc;
            --danger: #ef4444;
            --danger-dark: #7f1d1d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 10%, rgba(168, 85, 247, 0.14), transparent 35%),
                radial-gradient(circle at 88% 90%, rgba(139, 92, 246, 0.12), transparent 35%),
                var(--bg-main);
            color: var(--text-main);
            font-family: Inter, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: min(860px, 100%);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            margin: 0;
            color: var(--neon-cyan);
            letter-spacing: 0.7px;
            font-size: 1.2rem;
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .badge {
            border: 1px solid #5b2a86;
            color: #e9d5ff;
            background: rgba(192, 132, 252, 0.16);
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-family: "Courier New", monospace;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--line);
        }

        .tab-btn {
            border: 0;
            background: transparent;
            color: var(--text-muted);
            padding: 14px;
            font-size: 0.93rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            font-weight: 600;
        }

        .tab-btn.active {
            color: var(--neon-cyan);
            background: rgba(167, 139, 250, 0.12);
            border-bottom-color: var(--neon-cyan);
        }

        .content {
            padding: 22px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input, .textarea, .select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #100a22;
            color: var(--text-main);
            font-size: 0.95rem;
            padding: 11px 12px;
            outline: none;
            font-family: "Courier New", monospace;
        }

        .textarea {
            min-height: 140px;
            resize: vertical;
        }

        .input:focus, .textarea:focus, .select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.22);
        }

        .password-wrap {
            position: relative;
        }

        .eye-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            border: 1px solid var(--line);
            background: #1b1233;
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            padding: 6px 8px;
            font-size: 0.78rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 18px;
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .byte-count {
            font-size: 0.78rem;
            font-family: "Courier New", monospace;
            color: #c4b5fd;
        }

        .byte-count.danger {
            color: #fca5a5;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn {
            border: 0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #c084fc);
            color: #f8fafc;
        }

        .btn-primary:hover { filter: brightness(1.08); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            width: 100%;
            margin-top: 10px;
        }

        .btn-subtle {
            background: #22183e;
            color: #ddd6fe;
            border: 1px solid var(--line);
        }

        .result-box {
            margin-top: 16px;
            border: 1px solid #5b2a86;
            background: rgba(168, 85, 247, 0.14);
            border-radius: 9px;
            padding: 12px;
        }

        .result-link {
            margin-top: 8px;
            color: #e9d5ff;
            font-family: "Courier New", monospace;
            font-size: 0.86rem;
            word-break: break-all;
        }

        .result-link.danger {
            color: #fca5a5;
        }

        .read-banner {
            padding: 10px;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            margin-bottom: 14px;
            text-align: center;
            font-size: 0.86rem;
        }

        #displayArea {
            margin-top: 14px;
        }

        .decrypted-card {
            border: 1px solid var(--line);
            background: #100a22;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .decrypted-card.highlight {
            border-left: 3px solid var(--neon-emerald);
        }

        .data-label {
            color: var(--text-muted);
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .data-value {
            color: var(--text-main);
            font-family: "Courier New", monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            border: 1px solid #5b2a86;
            background: #2b164a;
            color: #f3e8ff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }

        .toast.danger {
            border-color: #7f1d1d;
            background: #2a1112;
            color: #fecaca;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        .hidden { display: none !important; }

        @media (max-width: 720px) {
            .grid { grid-template-columns: 1fr; }
            .action-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div id="createMode">
            <div class="header">
                <div>
                    <h1 class="title">ENIGMA // ZERO-TRUST VAULT</h1>
                    <p class="subtitle">Threat-intel style secure sharing with burn-after-read semantics.</p>
                </div>
                <span class="badge">CY321 MODE</span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" id="tab-password" data-tab="password">🔒 Password</button>
                <button class="tab-btn" id="tab-message" data-tab="message">🔗 Secure Message</button>
            </div>

            <div class="content">
                <div id="view-password" class="tab-view">
                    <div class="grid">
                        <div class="field">
                            <label>Login URL (Optional)</label>
                            <input class="input" id="loginUrl" type="text" placeholder="https://example.com/login">
                        </div>
                        <div class="field">
                            <label>Username (Optional)</label>
                            <input class="input" id="username" type="text" placeholder="analyst@example.com">
                        </div>
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <div class="password-wrap">
                            <input class="input" id="password" type="password" placeholder="Enter password">
                            <button class="eye-btn" id="togglePasswordBtn" type="button">Show</button>
                        </div>
                    </div>
                </div>

                <div id="view-message" class="tab-view hidden">
                    <div class="field">
                        <label>Secure Message</label>
                        <textarea class="textarea" id="secureMessage" placeholder="Paste confidential message..."></textarea>
                    </div>
                </div>

                <div class="field">
                    <label>Expiry Window</label>
                    <select class="select" id="expiresAfter">
                        <option value="1h">1 Hour</option>
                        <option value="24h" selected>24 Hours</option>
                        <option value="7d">7 Days</option>
                    </select>
                </div>

                <div class="meta-row">
                    <span class="hint">Payload is serialized to JSON, encrypted with AES-256-GCM in-browser.</span>
                    <span class="byte-count" id="byteCount">0/5000 bytes</span>
                </div>

                <div class="action-row">
                    <button class="btn btn-primary" id="encryptBtn" type="button">Encrypt & Generate Link</button>
                    <button class="btn btn-subtle" id="copyBtn" type="button">Copy Link</button>
                </div>
                <button class="btn btn-danger" id="honeyBtn" type="button">Deploy HoneyLink Trap</button>

                <div class="result-box hidden" id="resultBox">
                    <strong>Generated Link</strong>
                    <div class="result-link" id="outputLink"></div>
                </div>
            </div>
        </div>

        <div id="readMode" class="content hidden">
            <div class="read-banner">This note has been burned after retrieval and cannot be requested again.</div>
            <h2 class="title" style="font-size:1rem; margin-top: 0;">Decrypted Payload</h2>
            <div id="displayArea"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="crypto.js"></script>
</body>
</html>
